</head>
<style>
  body {
    background-color: #08040c;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  @font-face {
    font-family: 'Inter';
    src: url('Inter-VariableFont_opsz,wght.ttf') format('truetype');
  }

  @font-face {
    font-family: 'Ciento';
    src: url('Ciento Bold.otf') format('truetype');
  }

  @font-face {
    font-family: 'godber';
    src: url('godber-3lxoz.ttf') format('truetype');
  }

  .box {
    border: 1px solid;
    width: 850px;
    display: flex;
    justify-self: center;
    justify-content: center;
    margin-top: 80px;
    height: 420px;
    padding: 60px 0px 0px 0px;
    gap: 40px;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    border: 1.5px solid #8A2BE2;
    box-shadow: 3px 1px 13px 1px rgba(138, 43, 226, 0.6);
    font-family: 'Ciento';
  }

  .left-side {
    margin-left: 60px;
    position: absolute;
    width: 40%;
    background: linear-gradient(135deg, #6A1B9A, #3A0A5C);
    transform: skewX(-30deg);
    padding: 60px;
    color: #fff;
    z-index: 1;
    height: 100%;
    left: -239px;
    top: 0;
    flex-direction: column;
    padding-top: 60px;
    padding-left: 100px;
    font-family: "Poppins", sans-serif;
    box-shadow: 0 0 10px rgba(139, 54, 219, 0.705);
    border-right: 2px solid #8A2BE2;
    font-family: 'Ciento';
  }

  .left-side h1 {
    margin-left: 25px;
    padding-top: 50px;
    font-size: 35px;
    transform: skewX(30deg);
    font-family: 'Ciento';
  }

  .left-side h2 {
    margin-left: 65px;
    margin-top: -31px;
    transform: skewX(30deg);
    line-height: 1.0;
    font-family: 'Ciento';
  }

  .left-side p {
    margin-top: -21px;
    margin-left: 86px;
    color: rgba(255, 255, 255, 0.822);
    transform: skewX(30deg);
  }

  .form {
    width: 60%;
    color: white;
    background: transparent;
    margin-right: -700px;
    font-family: 'Inter';
    display: flex;
    justify-content: center;
    font-family: 'Ciento';
  }

  .form h1 {
    margin-top: -20px;
    text-align: center;
    margin-right: 300px;
    font-family: 'Ciento';
  }

  .form .input-box {
    display: flex;
    flex-direction: column;
    margin-left: -100px;
    width: 300px;
    color: rgba(255, 255, 255, 0.541);
    /* gap: 50px; */
    margin-bottom: 30px;
    font-size: 18px;

  }

  .form .input-box i {
    position: absolute;
    right: 80px;
    color: white;

  }

  /* .form .input-box .inputs{
  display: flex;
  flex-direction: column;
  gap: 100px;
  position: absolute;

 } */
  .form .input-box input {
    border: none;
    background: none;
    border-bottom: 2px solid rgba(255, 255, 255, 0.74);
    outline: none;
    color: white;
    font-size: 15px;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    transition: .5s;
  }

  button {
    width: 300px;
    align-self: center;
    padding: 10px;
    border-radius: 20px;
    border: none;
    font-family: 'Inter';
    font-weight: 700;
    font-size: 15px;
    margin-left: -90px;
    background: linear-gradient(180deg, #9D4DFF, #6A1BFF);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(138, 43, 226, 0.6);
    color: white;
    transition: .5s;
    margin-top: -10px;
  }

  button:hover {
    scale: 1.1;
  }

  input:active {
    background: none;
    border: none;

  .errormsg {
    color: rgb(231, 71, 71);
    position: absolute;
    font-size: 13px;
    /* margin-bottom: -200px; */
    margin-top: 45px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

  .message {
    border: 1px solid #8A2BE2;
    color: white;
    text-align: center;
    position: absolute;
    z-index: 10;
    width: 250px;
    padding: 5px 5px 5px;
    border-radius: 14px;
    background: linear-gradient(135deg, #6A1B9A, #3A0A5C);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    /* text-shadow: 0 0 7px rgba(201, 203, 255, 0.4); */
    font-family: 'Inter';
    font-size: 18px;
    margin-top: -100px;
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    opacity: 0;
    pointer-events: none;
    transition: 0.4s;
    z-index: 5;
    backdrop-filter: blur(4px);
  }

  .input-box #toggle1 {
    right: 120px;
    top: 270px;
    cursor: pointer;
    color: #a257e9;
    border-color: white;
    transition: .5s;
  }

  .input-box #toggle2 {
    right: 120px;
    top: 346px;
    cursor: pointer;
    color: #a257e9;
    transition: .5s;
  }

  .bottomtxt {
    display: flex;
    /* position: absolute; */
    margin-left: -50px;
    margin-top: -10px;
  }

  .bottomtxt a {
    margin-top: 16px;
  }

  /* MOBILE RESPONSIVENESS */
  @media (max-width: 768px) {

    body {
      padding: 20px;
      align-items: flex-start;
    }

    .box {
      width: 100%;
      height: auto;
      flex-direction: column;
      padding: 20px;
      gap: 20px;
      margin-top: 20px;
    }

    /* Simplify left side */
    .left-side {
      position: static;
      transform: none;
      width: 95%;
      height: auto;
      padding: 20px;
      margin: 0;
      text-align: center;
      border-right: none;
      align-self: center;
      display: flex;
      justify-self: center;
      /* margin-top: -18px; */
      margin-top: -10px;
    }

    .left-side h1,
    .left-side h2,
    .left-side p {
      transform: none;
      margin: 5px 0;
    }

    .form {
      width: 100%;
      margin: 0;
      justify-content: center;
    }

    .form h1 {
      margin: 0 0 20px 0;
      text-align: center;
    }

    .form .input-box {
      width: 100%;
      margin-left: 0;
    }

    .form .input-box input {
      width: 100%;
    }

    button {
      width: 100%;
      margin-left: 0;
      /* margin-top: 3px; */
    }

    .bottomtxt {
      margin-left: 0;
      justify-content: center;
      text-align: center;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 2px;
    }

    /* Fix eye icons position */
    .input-box #toggle1,
    .input-box #toggle2 {
      /* right: 10px; */
      top: auto;
      margin-top: 40px;
      transform: translateY(-30px);
    }

    /* Message popup scaling */
    .message {
      width: 60%;
      font-size: 16px;
      /* margin-top: 380px; */
      /* top: 700px; */

    }

</style>

<body>
  <div id="overlay" class="overlay"></div>
  <div id="msg" class="message">
    <p>Registration Successful!</p>
  </div>
  <section class="box">
    <div class="left-side">
      <h1>WELCOME!</h1>
      <h2>CREATE AN ACCOUNT TO CONTINUE.</h2>
      <p>Fast. Easy. Secure.</p>
    </div>
    <div class="line"></div>
    <div class="form">
      <form action="submit" id="form">
        <h1>Sign Up</h1>
        <div class="inputs">
          <div class="input-box">
            <label>Username</label>
            <i class="ri-user-fill"></i>
            <input type="text" id="name" />
            <span id="nameError" class="errormsg"></span>
          </div>
          <div class="input-box">
            <label>Email</label>
            <i class="ri-mail-fill"></i>
            <input id="mail" />
            <span id="mailError" class="errormsg"></span>
          </div>

          <div class="input-box">
            <label>Password</label>
            <i class="ri-lock-fill"></i>
            <input type="password" id="password" />
            <i class="ri-eye-fill" id="toggle1"></i>
            <span id="passwordError" class="errormsg"></span>
          </div>
          <div class="input-box">
            <label>Confirm Password</label>
            <i class="ri-lock-password-fill"></i>
            <input type="password" id="password2" />
            <i class="ri-eye-fill" id="toggle2"></i>
            <span id="passwordError2" class="errormsg"> </span>
          </div>
          <button type="submit">Sign Up</button>
          <div class="bottomtxt">
            <p>Already Have an Account?</p><a href="loginform.html">Log In</a>
          </div>
        </div>
      </form>
    </div>
  </section>
  <script>
    const name = document.getElementById("name");
    const mail = document.getElementById("mail");
    const password = document.getElementById("password");
    const password2 = document.getElementById("password2");
    const form = document.getElementById("form");
    const btn = document.getElementById("btn");



    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const isValid =
        validateName() &&
        validateMail() &&
        validatePassword() &&
        validatePassword2();

      if (isValid) { 
        const user = {
          username: name.value.trim(),
          email: mail.value.trim(),
          password: password.value.trim()
        };

        let users = JSON.parse(localStorage.getItem("users")) || [];
        users.push(user);
        localStorage.setItem("users", JSON.stringify(users));
        

        setTimeout(() => {
          const overlay = document.getElementById("overlay")
          let msg = document.getElementById("msg");
          if (window.matchMedia("(max-width:768px)").matches) {
            msg.style.opacity = "1";
            msg.style.transform = "translateY(400px)";
          } else {
            msg.style.opacity = "1";
            msg.style.transform = "translateY(60px)";
          }
          overlay.style.opacity = "1";
          overlay.style.pointerEvents = "auto";
        }, 500);




        localStorage.setItem("currentUser", JSON.stringify(user));

        setTimeout(() => {
          form.reset();
          msg.style.opacity = "0";
          msg.style.transform = "translateY(0px)";

          name.style.borderBottomColor = "";
          mail.style.borderBottomColor = "";
          password.style.borderBottomColor = "";
          password2.style.borderBottomColor = "";

          overlay.style.opacity = "0";
          overlay.style.pointerEvents = "none";



        }, 1500);

        setTimeout(() => {
          window.location.href = "profile.html";
        }, 2000);
      }
      console.log(
        validateName(),
        validateMail(),
        validatePassword(),
        validatePassword2()
      );
    });



    const nameValue = name.value.trim();
    const mailValue = mail.value.trim();
    const passwordValue = password.value.trim();
    const password2Value = password2.value.trim();
    const nameError = document.getElementById("nameError")
    const mailError = document.getElementById("mailError")
    const passwordError = document.getElementById("passwordError")
    const passwordError2 = document.getElementById("passwordError2")

    const username = /^[A-Z][a-z0-9]{2,}$/;
    const email = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

    let isValid = true;

    function validateName() {
      const nameValue = name.value.trim();
      const username = /^[A-Z][a-z0-9]{2,}$/;

      if (nameValue === "") {
        nameError.textContent = "Input Username.";
        name.style.borderBottomColor = "red"
        return false;
      } else if (!username.test(nameValue)) {
        nameError.textContent = "Must start with capital, no symbols and min of 3 chars.";
        name.style.borderBottomColor = "red";
        return false;
      } else {
        nameError.textContent = "";
        name.style.borderBottomColor = "rgb(4, 180, 4)";
        return true;
      }
    }


    function validateMail() {
      const mailValue = mail.value.trim();
      const email = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (mailValue === "") {
        mailError.textContent = "Input Email";
        mail.style.borderBottomColor = "red";
        return false;
      } else if (!email.test(mailValue)) {
        mailError.textContent = "Invalid email.";
        mail.style.borderBottomColor = "red";
        return false;
      } else {
        mailError.textContent = "";
        mail.style.borderBottomColor = "rgb(4, 180, 4)";
        return true;
      }
    }


    function validatePassword() {
      const passwordValue = password.value.trim();
      const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

      if (passwordValue === "") {
        passwordError.textContent = "Input Password";
        password.style.borderBottomColor = "red";
        return false;
      } else if (!passwordPattern.test(passwordValue)) {
        passwordError.textContent = "Min 8 chars, uppercase & number.";
        password.style.borderBottomColor = "red";
        return false;
      } else {
        passwordError.textContent = "";
        password.style.borderBottomColor = "rgb(4, 180, 4)";
        return true;
      }
    }


    function validatePassword2() {
      const password2Value = password2.value.trim();

      if (password2Value === "") {
        passwordError2.textContent = "Confirm Password.";
        password2.style.borderBottomColor = "red";
        return false;
      } else if (password2Value !== password.value.trim()) {
        passwordError2.textContent = "Passwords do not match.";
        password2.style.borderBottomColor = "red";
        return false;
      } else {
        passwordError2.textContent = "";
        password2.style.borderBottomColor = "rgb(4, 180, 4)";
        return true;
      }
    }


    name.addEventListener("input", validateName);
    mail.addEventListener("input", validateMail);
    password.addEventListener("input", validatePassword);
    password2.addEventListener("input", validatePassword2);

    const togglePassword = document.getElementById("toggle1");
    const togglePassword2 = document.getElementById("toggle2");

    togglePassword.addEventListener("click", () => {
      if (password.type === "password") {
        password.type = "text";
        togglePassword.classList.remove("ri-eye-fill");
        togglePassword.classList.add("ri-eye-off-fill");
      } else {
        password.type = "password";
        togglePassword.classList.remove("ri-eye-off-fill");
        togglePassword.classList.add("ri-eye-fill");
      }
    });

    togglePassword2.addEventListener("click", () => {
      if (password2.type === "password") {
        password2.type = "text";
        togglePassword2.classList.remove("ri-eye-fill");
        togglePassword2.classList.add("ri-eye-off-fill");
      } else {
        password2.type = "password";
        togglePassword2.classList.remove("ri-eye-off-fill");
        togglePassword2.classList.add("ri-eye-fill");
      }
    });










    // if (isValid) {
    //   nameError.textContent = ""
    //   mailError.textContent = ""
    //   passwordError.textContent = ""
    //   passwordError2.textContent = ""

    //     username: nameValue,
    //     email: mailValue,
    //     password: passwordValue
    //   };

    //   users.push(user);

    //   localStorage.setItem("users", JSON.stringify(users));

    //   mail.style.borderBottomColor = "";
    //   password.style.borderBottomColor = "";
    //   password2.style.borderBottomColor = "";

    //   setTimeout(() => {
    //     alert("Registration successful");
    //     form.reset();
    //   }, 1000);
    // }

    // alert("Registration successful");

  </script>
</body>
