<style>
    body {

    .box {

    /* .side-div #icon2{

    } */

    @keyframes fadeUp1 {
        0% {
            opacity: 0;
            transform: translateY(10px);

        }

        100% {
            opacity: 1;
            transform: translateY(-10px);
        }
    }

    @keyframes fadeUp2 {
        0% {
            opacity: 0;
            transform: translateY(10px);

        }

        100% {

            transform: translateY(-10px);
        }
    }

    @keyframes fadeUp3 {
        0% {

    /* 
    @keyframes slide {

    @keyframes scale {

    }

        }

        }
    }

    @font-face {
        font-family: 'Ciento';
        src: url('Ciento Bold.otf') format('truetype');
    }

    @font-face {
        font-family: 'Inter';

    }

    .logout {
        width: 400px;
        align-self: center;
        padding: 13px;

        border: none;

        box-shadow: 0 0 10px rgba(138, 43, 226, 0.6);

        transition: .5s;

    }

    .logout:hover {
        scale: 1.1;
        background-color: rgb(219, 208, 208);
        color: #52058a;
    }

    #box-2 {
        width: 50%;
        align-self: center;
        display: none;
        flex-direction: column;
        justify-self: center;
        margin-top: 80px;
        border-radius: 14px;
        padding-top: 10px;
        background-color: rgb(255, 251, 248);
        justify-content: center;
        justify-items: center;
        align-items: center;
        box-shadow: 0px 0px 23px rgb(137, 43, 226);
        height: 400px;
        background: linear-gradient(#8b26ca, #52058a);
        font-family: 'Inter';
        margin-left: 170px;
        transition: .5s;
    }

    .name2 {
        display: flex;
        width: 500px;
        padding: 10px;
        border-radius: 14px;
        background-color: rgb(219, 208, 208);
        color: #52058a;
        gap: 320px;
        height: 40px;
        /* transform: translateY(-10px); */
        /* margin-top: 1; */
        animation: fadeUp1 .7s .6s forwards ease-in-out;
        transition: .5s;
        opacity: 0;
        min-width: 0;
        padding: 10px 20px;
    }

    .password2 {
        display: flex;
        width: 500px;
        padding: 10px;
        border-radius: 14px;
        background-color: rgb(219, 208, 208);
        color: #52058a;
        gap: 270px;
        height: 40px;
        animation: fadeUp3 .7s .8s forwards ease-in-out;
        opacity: 0;
        transition: .5s;
        min-width: 0;
        padding: 10px 20px;
        min-width: 0;
        padding: 10px 20px;
    }



    .name2 h4 {
        margin-top: 10px;
    }

    .password2 h4 {
        margin-top: 10px;
    }

    #box-2 input {
        background: none;
        margin-left: -140px;
        padding: 10px;
        border: none;
        outline: none;
        font-size: 18px;
        color: rgba(109, 106, 112, 0.856);
        font-weight: 1000;
        overflow: visible;
    }

    .info2 {
        font-size: 20px;
        margin-top: 50px;
        display: flex;
        flex-direction: column;
        gap: 30px;
        overflow: visible;
    }

    .top-text2 h1 {
        width: fit-content;
        opacity: 1;
        transition: .6s;
        /* transform: translateX(50px); */
        /* margin-left: -109px; */
        margin-top: -65px;
        font-size: 50px;
        text-align: center;
        /* border-left: 2px solid black; */
        align-self: center;
    }

    .top-text2 {
        display: flex;
        justify-content: center;
        /* gap: 65px; */
        justify-items: center;
        flex-direction: column;
        justify-self: center;
        /* margin-left: -70px; */
        margin-top: 65px;
        text-align: center;
    }

    .top-text2 p {
        margin-top: -30px;
    }

    .save {
        width: 400px;
        align-self: center;
        padding: 13px;
        border-radius: 15px;
        border: none;
        font-family: 'Inter';
        font-weight: 700;
        font-size: 18px;
        /* margin-left: -90px; */
        background-color: #8b26ca;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(138, 43, 226, 0.6);
        color: white;
        transition: .5s;
        margin-top: 20px;
        animation: show .8s 1s forwards ease-in-out;

    }

    .save:hover {

    }


    /* margin-top: -20px; */


    /* MOBILE RESPONSIVENESS */
    @media (max-width: 768px) {

        body {
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        .box {
            width: 90%;
            margin-left: 6px;
            height: auto;
            padding: 20px 10px;
            justify-self: center;
            align-self: center;
        }

        .top-text {
            gap: 20px;
            margin-left: 0;
            flex-direction: column;
            align-items: center;
        }

        .top-text i {
            position: static;
            font-size: 70px;
            transform: none !important;
        }

        .top-text h1 {
            text-align: center;
            transform: none !important;
        }

        .info {
            width: 100%;
            align-items: center;
        }

        .name,
        .mail,
        .password {
            width: 90%;
            /* gap: 3px; */
            justify-content: space-between;
            /* display: flex; */
            /* height: auto; */
            /* flex-wrap: wrap; */
            font-size: 17px;
            overflow: visible;
            min-width: 0;
            min-width: 0;
            padding: 10px 20px;
        }

        .name {
            justify-content: space-between;
            /* gap: 10px; */
        }

        .mail {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 15px;
        }
        .mail-text{
            font-size: 2px;
        }

        .password{
            /* gap: 10px; */
        }
        .password p {
            /* margin: 0; */
        }

        .logout {
            width: 90%;
        }

        .side-div {
            position: fixed;

            left: 31%;
            justify-self: center;
            align-self: center;
            /* transform: translateX(-50%); */
            flex-direction: row;
            gap: 30px;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 999;
        }

        .side-div i {

            margin-left: 0;

        }

        .password2 {
            width: 90%;

            /* display: flex; */
            /* height: auto; */

           padding: 10px 20px;
        }

</style>

<body>
    <div class="side-div">
        <i class="ri-user-line" id="icon2"></i>
        <i class="ri-edit-2-line" id="icon3"></i>
    </div>
    <div class="box" id="box">
        <div class="top-text">
            <i class="ri-user-line" id="icon"></i>
            <div class="line" id="line"></div>
            <h1 id="wlcText"></h1>
        </div>
        <div class="info">
            <div class="name">
                <h4>Username</h4>
                <p id="username"></p>
            </div>
            <div class="mail">
                <h4>Email Address</h4>
                <p id="mail" class="mail-text"></p>
            </div>
            <div class="password">
                <h4>Password</h4>
                <p id="password"></p>
            </div>
        </div>
        <button id="logOut" class="logout">Log Out</button>
    </div>
    <section id="box-2">
        <div class="top-text2">
            <!-- <i class="ri-user-line" id="icon"></i> -->
            <!-- <div class="line" id="line"></div> -->
            <h1 id="wlcText">EDIT PROFILE</h1>
            <p>You Can Edit your Profile Details Here </p>
        </div>
        <div class="info2">
            <div class="name2">
                <h4>Username</h4>
                <input type="text" id="name">
            </div>
            <div class="password2">
                <h4>Password</h4>
                <input type="text" id="password2" style="width: 400px;">
            </div>
        </div>
        <button id="savebtn" class="save">SAVE</button>

    </section>
    <script>
        const wlcText = document.getElementById("wlcText");
        const username = document.getElementById("username");
        const mail = document.getElementById("mail");
        const password = document.getElementById("password");

        const currentUser = JSON.parse(localStorage.getItem("currentUser"))

        if (currentUser) {
            wlcText.textContent = "Welcome," + currentUser.username;

            username.textContent = currentUser.username;
            mail.textContent = currentUser.email;
            password.textContent = currentUser.password;
        }

        if (window.matchMedia("(max-width:768px)").matches) {
            mail.style.fontSize = "13px";
            
        }

        const icon2 = document.getElementById("icon2")
        const icon3 = document.getElementById("icon3")
        const icon = document.getElementById("icon")
        setTimeout(() => {
            wlcText.style.transition = "opacity 1s ease, transform .9s ease";
            wlcText.style.opacity = "1";
            wlcText.style.width = "100%";
            wlcText.style.transform = "translateX(70px)"
            icon.style.transform = "translateX(-120px)"
            icon2.classList.add("active")
        }, 1200);


        const box = document.getElementById("box")
        const box2 = document.getElementById("box-2")
        icon2.addEventListener("click", () => {
            icon2.classList.add("active");
            icon3.classList.remove("active");
            // icon2.style.backgroundColor = "#52058a"
            // icon2.style.color = "white"
            if (window.matchMedia("(max-width:768px)").matches) {
                box.style.transform = "translateX(.2px)"

                box2.style.transform = "translateX(530px)"
                // box2.style.transition = ".7s"

                setTimeout(() => {
                    box2.style.display = "none"
                }, 200);
            } else {
                box.style.transform = "translateY(.2px)"

                box2.style.transform = "translateY(530px)"
                box2.style.transition = ".7s"

                setTimeout(() => {
                    box2.style.display = "none"
                }, 100);
            }

        });

        icon3.addEventListener("click", () => {
            icon3.classList.add("active");
            icon2.classList.remove("active");
            // icon2.style.backgroundColor = "white"
            // icon2.style.color = "#52058a"
            // icon2.style.boxShadow = "0px 0px 0px"
            if (window.matchMedia("(max-width:768px)").matches) {
                box.style.transform = "translateX(-500px)"
                box2.style.display = "flex"
                
                setTimeout(() => {
                    box2.style.transform = "translateX(-430px)"
                    // box2.style.transition = ".7s"
                }, 200);
            } else {
                box.style.transform = "translateY(-800px)"
                box2.style.display = "flex"
                setTimeout(() => {
                    box2.style.transform = "translateY(-530px)"
                    box2.style.transition = ".7s"
                }, 100);
            }


        });

        const line = document.getElementById("line")
        setTimeout(() => {
            line.style.opacity = "1";
        }, 2000);

        const logout = document.getElementById("logOut")

        logout.onclick = function name(params) {
            localStorage.removeItem("currentUser");
            window.location.href = "loginform.html"

        }

        const nameInput = document.getElementById("name");
        const passwordInput = document.getElementById("password2");
        const saveBtn = document.getElementById("savebtn");

        document.addEventListener("DOMContentLoaded", () => {
            const users = JSON.parse(localStorage.getItem("users")) || [];
            const currentUser = JSON.parse(localStorage.getItem("currentUser"))

            if (!currentUser) {
                window.location.href = "loginform.html";
                return;
            }


            nameInput.value = currentUser.username;
            passwordInput.value = currentUser.password;

            console.log(passwordInput.value = currentUser.password);


            saveBtn.addEventListener("click", () => {
                const newUsername = nameInput.value.trim()
                const newPassword = passwordInput.value.trim()

                if (newUsername === "" || newPassword === "") {
                    window.alert("Fields cannot be empty")
                }

                const userIndex = users.findIndex(user => user.username === currentUser.username);

                users[userIndex].username = newUsername
                users[userIndex].password = newPassword

                localStorage.setItem("users", JSON.stringify(users));
                localStorage.setItem("currentUser", JSON.stringify(users));

                console.log(newUsername);
                console.log(newPassword);

                username.textContent = newUsername;
                password.textContent = newPassword;
                wlcText.textContent = "Welcome," + newUsername;

                window.alert("Details Successfully Updated")

                // window.location.href ="profile.html"
                // location.reload()




            })



        })

    </script>
</body>

</html>
